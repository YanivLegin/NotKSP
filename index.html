            const [searchQuery, setSearchQuery] = useState('');
            const [cart, setCart] = useState([]);
            const [activeProduct, setActiveProduct] = useState(null);
            const [completedOrder, setCompletedOrder] = useState(null);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [recentlyViewed, setRecentlyViewed] = useState([]);

            // Form States for checkout
            const [formName, setFormName] = useState('');
            const [formPhone, setFormPhone] = useState('');
            const [formAddress, setFormAddress] = useState('');
            const [formErrors, setFormErrors] = useState({});

            // Load cart and recently viewed from localStorage on initial load
            useEffect(() => {
                const storedCart = localStorage.getItem('notksp_cart');
                if (storedCart) {
                    try {
                        setCart(JSON.parse(storedCart));
                    } catch (e) {
                        console.error('Error loading cart', e);
                    }
                }

                const storedRecently = localStorage.getItem('notksp_recently_viewed');
                if (storedRecently) {
                    try {
                        setRecentlyViewed(JSON.parse(storedRecently));
                    } catch (e) {
                        console.error('Error loading recently viewed', e);
                    }
                }
            }, []);

            // Save cart to localStorage when it changes
            const saveCart = (newCart) => {
                setCart(newCart);
                localStorage.setItem('notksp_cart', JSON.stringify(newCart));
            };

            // Trigger Lucide icons update on view updates
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, activeProduct, isCartOpen, selectedCategory, searchQuery]);

            // Add product to recently viewed (max 4, no duplicates, move to front)
            const addToRecentlyViewed = (productId) => {
                let updated = [productId, ...recentlyViewed.filter(id => id !== productId)];
                updated = updated.slice(0, 4); // Limit to 4
                setRecentlyViewed(updated);
                localStorage.setItem('notksp_recently_viewed', JSON.stringify(updated));

            const openProductDetails = (product) => {
                setActiveProduct(product);
                addToRecentlyViewed(product.id);

            const addToCart = (product) => {
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    const updated = cart.map(item => 
                        item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                    );
                    saveCart(updated);
                } else {
                    const updated = [...cart, { ...product, quantity: 1 }];
                    saveCart(updated);
                }
                
                // Show floating small notification or just open cart drawer
                setIsCartOpen(true);
            };

            const updateCartQuantity = (productId, change) => {
                const updated = cart.map(item => {
                    if (item.id === productId) {
                        const newQty = item.quantity + change;
                        return newQty > 0 ? { ...item, quantity: newQty } : null;
                    }
                    return item;
                }).filter(Boolean);
                saveCart(updated);
            };

            const removeFromCart = (productId) => {
                const updated = cart.filter(item => item.id !== productId);
                saveCart(updated);
            };

            const clearCart = () => {
                saveCart([]);

            const cartTotal = useMemo(() => {
                return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
            }, [cart]);

            const cartCount = useMemo(() => {
                return cart.reduce((count, item) => count + item.quantity, 0);
            }, [cart]);

            const filteredProducts = useMemo(() => {
                return PRODUCTS.filter(product => {
                    const matchesCategory = selectedCategory === 'all' || product.category === selectedCategory;
                    
                    const query = searchQuery.trim().toLowerCase();
                    const matchesSearch = !query || 
                        product.name.toLowerCase().includes(query) || 
                        product.description.toLowerCase().includes(query);
                        
                    return matchesCategory && matchesSearch;

            const similarProducts = useMemo(() => {
                if (!activeProduct) return [];
                // Find products in same category (excluding active one)
                let list = PRODUCTS.filter(p => p.id !== activeProduct.id && p.category === activeProduct.category);
                if (list.length === 0) {
                    // Fallback to any other products
                    list = PRODUCTS.filter(p => p.id !== activeProduct.id);

                // Return up to 3 random ones from the list
                return list.slice(0, 3);

                if (Object.keys(errors).length > 0) {

                    return;

                    customerName: formName,
                    customerPhone: formPhone,
                    customerAddress: formAddress,

                };

                clearCart();

                setFormPhone('');
                setFormAddress('');

                                    </div>

                                    {/* Drawer Footer */}
                                    {cart.length > 0 && (
                                        <div className="border-t border-slate-200 px-6 py-5 bg-slate-50 space-y-4">
                                            <div className="space-y-1.5">
                                                <div className="flex justify-between text-xs text-slate-500">
                                                    <span>סה"כ פריטים:</span>
                                                    <span>{cartCount}</span>
                                                </div>
                                                <div className="flex justify-between font-heebo font-black text-sm text-primary">
                                                    <span>סה"כ לתשלום:</span>
                                                    <span className="text-base">{cartTotal.toLocaleString('he-IL')} ₪</span>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-3">
                                                <button 
                                                    onClick={() => { setIsCartOpen(false); setView('checkout'); }}
                                                    className="bg-cta hover:bg-cta-hover text-primary font-bold py-2.5 rounded-xl text-center text-xs shadow-md transition-all flex items-center justify-center gap-1"
                                                >
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><rect width="18" height="12" x="3" y="6" rx="2"/><path d="M3 10h18"/></svg>
                                                    המשך לתשלום
                                                </button>
                                                <button 
                                                    onClick={clearCart}
                                                    className="border border-slate-300 hover:bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl text-xs transition-all"
                                                >
                                                    ריקון סל
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render root React component
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
