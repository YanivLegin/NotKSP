        const Icon = ({ name, className }) => {

            return <span ref={ref} style={{ display: 'contents' }}></span>;
        };

        const LS = {
            get(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : fallback;
                } catch (e) { return fallback; }
            },
            set(key, value) {
                try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
            }
        };

        // Default stock quantities for the base products (id -> units).
        // Two products (3, 6) start out of stock to demo the "request" flow.
        const STOCK_DEFAULTS = { "1": 5, "2": 3, "3": 0, "4": 12, "6": 0, "7": 2, "8": 15, "9": 10, "10": 4, "11": 7, "12": 1, "13": 8, "14": 5, "15": 3, "16": 9 };

        // ============================================================
        //  NEW: Brevo config for password-reset emails.
        //  The API key is a SECRET and must live on a backend, never here.
        //  Set `endpoint` to your serverless URL (see brevo-reset-password.js).
        //  While empty, the app simulates the reset and shows the token on screen.
        // ============================================================
        const BREVO_CONFIG = {
            endpoint: "",                       // e.g. "https://your-site.vercel.app/api/reset-password"
            fromName: "NotKSP",
            fromEmail: "no-reply@notksp.co.il"
        };

        // ============================================================
        //  NEW: Lightweight (NON-secure, prototype only) password hashing.
        //  Real auth must hash+salt on a server. This only avoids storing
        //  plaintext in localStorage for the demo.
        // ============================================================
        const pseudoHash = (str) => {
            let h = 5381;
            for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
            return "h" + h.toString(16);
        };

        const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Validation for the registration form (mandatory fields + criteria)
        const validateRegister = ({ name, email, password, confirm }) => {
            const errors = {};
            if (!name || !name.trim()) errors.name = "נא להזין שם מלא";
            if (!email || !email.trim()) errors.email = "נא להזין כתובת אימייל";
            else if (!EMAIL_RE.test(email.trim())) errors.email = "כתובת אימייל אינה תקינה";
            if (!password) errors.password = "נא להזין סיסמה";
            else if (password.length < 6) errors.password = "הסיסמה חייבת להכיל לפחות 6 תווים";
            else if (!/[A-Za-z]/.test(password) || !/\d/.test(password)) errors.password = "הסיסמה חייבת לכלול אות וספרה";
            if (confirm !== undefined && password !== confirm) errors.confirm = "הסיסמאות אינן תואמות";
            return errors;
        };

        // ============================================================
        //  NEW: Presentational helpers for the admin dashboard
        // ============================================================
        const StatCard = ({ label, value, sub, icon, tone = "primary" }) => {
            const tones = {
                primary: "from-primary to-primary-light text-white",
                cta: "from-cta to-cta-hover text-primary",
                amber: "from-amber-400 to-amber-500 text-white",
                slate: "from-slate-600 to-slate-700 text-white"
            };
            return (
                <div className="bg-white rounded-2xl border border-slate-100 shadow-premium p-5 flex items-center gap-4">
                    <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${tones[tone]} flex items-center justify-center shrink-0`}>
                        <Icon name={icon} className={"w-6 h-6"} />
                    </div>
                    <div className="min-w-0">
                        <div className="text-[11px] text-slate-500 font-semibold truncate">{label}</div>
                        <div className="text-xl font-heebo font-black text-slate-900 leading-tight">{value}</div>
                        {sub && <div className="text-[10px] text-slate-400 truncate">{sub}</div>}
                    </div>
                </div>
            );
        };

        // Simple dependency-free horizontal bar chart
        const BarChart = ({ data, unit = "", color = "#1B3A5C" }) => {
            const max = Math.max(1, ...data.map(d => d.value));
            return (
                <div className="space-y-2.5">
                    {data.length === 0 && <p className="text-xs text-slate-400 text-center py-4">אין נתונים להצגה עדיין.</p>}
                    {data.map((d) => (
                        <div key={d.label} className="space-y-1">
                            <div className="flex justify-between text-[11px] text-slate-600">
                                <span className="truncate ml-2 font-semibold">{d.label}</span>
                                <span className="font-heebo font-bold text-slate-800 shrink-0">{(Number(d.value) || 0).toLocaleString('he-IL')}{unit}</span>
                            </div>
                            <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full rounded-full transition-all duration-500" style={{ width: `${(d.value / max) * 100}%`, backgroundColor: color }}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const stockMeta = (qty) => {
            if (qty <= 0) return { label: "אזל מהמלאי", cls: "bg-red-100 text-red-700 border-red-200", dot: "bg-red-500" };
            if (qty <= 3) return { label: `מלאי נמוך · נותרו ${qty}`, cls: "bg-amber-100 text-amber-700 border-amber-200", dot: "bg-amber-500" };
            return { label: `במלאי · ${qty} יח׳`, cls: "bg-cta-light text-cta-hover border-cta/30", dot: "bg-cta" };
        };

        // ============================================================
        //  NEW: Admin components (statistical dashboard, inventory, etc.)
        // ============================================================
        const catName = (id) => (CATEGORIES.find(c => c.id === id) || {}).name || id;

        const AdminDashboard = ({ catalog, orders, requests, users, wishlistMap }) => {
            const totalUnits = catalog.reduce((s, p) => s + p.stock_quantity, 0);
            const inventoryValue = catalog.reduce((s, p) => s + p.stock_quantity * p.price, 0);
            const outOfStock = catalog.filter(p => p.stock_quantity <= 0).length;
            const lowStock = catalog.filter(p => p.stock_quantity > 0 && p.stock_quantity <= 3).length;
            const revenue = (Array.isArray(orders) ? orders : []).reduce((s, o) => s + o.total, 0);
            const openReq = requests.filter(r => r.status === 'open').length;
            const customerCount = users.filter(u => u.role === 'customer').length;

            // Wishlist popularity across all users
            const wishCounts = {};
            Object.values(wishlistMap || {}).forEach(list => (list || []).forEach(id => { wishCounts[id] = (wishCounts[id] || 0) + 1; }));
            const topWishlist = Object.entries(wishCounts)
                .map(([id, count]) => ({ label: (catalog.find(p => p.id === id) || {}).name || id, value: count }))
                .sort((a, b) => b.value - a.value).slice(0, 5);

            // Units sold per product (from orders)
            const soldCounts = {};
            orders.forEach(o => o.items.forEach(it => { soldCounts[it.name] = (soldCounts[it.name] || 0) + it.quantity; }));
            const topSold = Object.entries(soldCounts)
                .map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value).slice(0, 5);

            // Revenue by category
            const catRev = {};
            orders.forEach(o => o.items.forEach(it => { const c = catName(it.category); catRev[c] = (catRev[c] || 0) + it.price * it.quantity; }));
            const revByCat = Object.entries(catRev).map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value);

            const stockByProduct = [...catalog].sort((a, b) => a.stock_quantity - b.stock_quantity).slice(0, 8)
                .map(p => ({ label: p.name, value: p.stock_quantity }));

            return (
                <div className="space-y-6">
                    <div>

                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard label="הכנסות (מדומה)" value={`${(Number(revenue) || 0).toLocaleString('he-IL')} ₪`} sub={`${orders.length} הזמנות`} icon="trending-up" tone="cta" />
                        <StatCard label="שווי מלאי" value={`${(Number(inventoryValue) || 0).toLocaleString('he-IL')} ₪`} sub={`${(Number(totalUnits) || 0).toLocaleString('he-IL')} יחידות`} icon="wallet" tone="primary" />
                        <StatCard label="מוצרים בקטלוג" value={catalog.length} sub={`${outOfStock} אזלו · ${lowStock} מלאי נמוך`} icon="package" tone="slate" />
                        <StatCard label="בקשות מוצרים" value={openReq} sub="ממתינות לטיפול" icon="inbox" tone="amber" />
                    </div>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard label="לקוחות רשומים" value={customerCount} icon="users" tone="primary" />
                        <StatCard label="פריטים שנמכרו" value={Object.values(soldCounts).reduce((a, b) => a + b, 0)} icon="shopping-cart" tone="slate" />
                        <StatCard label="שמירות ברשימת משאלות" value={Object.values(wishCounts).reduce((a, b) => a + b, 0)} icon="heart" tone="cta" />
                        <StatCard label="מוצרים אזלו" value={outOfStock} icon="alert-triangle" tone="amber" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-2xl border border-slate-100 shadow-premium p-5 space-y-4">
                            <h3 className="font-heebo font-black text-slate-800 text-sm flex items-center gap-2"><Icon name={"boxes"} className={"w-4 h-4 text-primary"} /> מלאי לפי מוצר (הנמוכים ביותר)</h3>
                            <BarChart data={stockByProduct} unit=" יח׳" color="#1B3A5C" />
                        </div>
                        <div className="bg-white rounded-2xl border border-slate-100 shadow-premium p-5 space-y-4">
                            <h3 className="font-heebo font-black text-slate-800 text-sm flex items-center gap-2"><Icon name={"flame"} className={"w-4 h-4 text-cta-hover"} /> המוצרים הנמכרים ביותר</h3>
                            <BarChart data={topSold} unit=" נמכרו" color="#00C48C" />
                        </div>
                        <div className="bg-white rounded-2xl border border-slate-100 shadow-premium p-5 space-y-4">
                            <h3 className="font-heebo font-black text-slate-800 text-sm flex items-center gap-2"><Icon name={"heart"} className={"w-4 h-4 text-red-500"} /> מבוקשים ברשימת המשאלות</h3>
                            <BarChart data={topWishlist} unit=" שמירות" color="#ef4444" />
                        </div>
                        <div className="bg-white rounded-2xl border border-slate-100 shadow-premium p-5 space-y-4">
                            <h3 className="font-heebo font-black text-slate-800 text-sm flex items-center gap-2"><Icon name={"pie-chart"} className={"w-4 h-4 text-primary"} /> הכנסות לפי קטגוריה</h3>
                            <BarChart data={revByCat} unit=" ₪" color="#2C527C" />

                    </div>

            );

        const AdminInventory = ({ catalog, customProducts, onSetStock, onAdjust, onDelete }) => {
            const customIds = new Set(customProducts.map(p => p.id));
            return (
                <div className="space-y-5">
                    <div className="flex items-end justify-between flex-wrap gap-2">

                            <p className="text-xs text-slate-500 mt-1">עדכון כמויות המלאי מתעדכן מיידית בחנות ואצל הלקוח.</p>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl border border-slate-100 shadow-premium overflow-hidden">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-right text-xs">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-500 border-b border-slate-100">
                                        <th className="py-3 px-4 font-bold">מוצר</th>
                                        <th className="py-3 px-4 font-bold hidden sm:table-cell">קטגוריה</th>

                                <tbody className="divide-y divide-slate-50">
                                    {catalog.map(p => { const m = stockMeta(p.stock_quantity); return (
                                        <tr key={p.id} className="hover:bg-slate-50/50">
                                            <td className="py-2.5 px-4">
                                                <div className="flex items-center gap-2.5">

                                                </div>

                                                <div className="flex items-center justify-center gap-1.5">
                                                    <button onClick={() => onAdjust(p.id, -1)} className="w-7 h-7 rounded-full border border-slate-300 hover:bg-slate-100 flex items-center justify-center font-bold">−</button>
                                                    <input
                                                        type="number" min="0" value={p.stock_quantity}
                                                        onChange={(e) => onSetStock(p.id, e.target.value)}
                                                        className="w-14 text-center border border-slate-300 rounded-lg py-1 font-bold focus:outline-none focus:border-primary"
                                                    />
                                                    <button onClick={() => onAdjust(p.id, 1)} className="w-7 h-7 rounded-full border border-slate-300 hover:bg-slate-100 flex items-center justify-center font-bold">+</button>
                                                </div>
                                            </td>
                                            <td className="py-2.5 px-4 text-center">
                                                <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full border ${m.cls}`}><span className={`w-1.5 h-1.5 rounded-full ${m.dot}`}></span>{m.label}</span>
                                            </td>
                                            <td className="py-2.5 px-4 text-center">
                                                {customIds.has(p.id) ? (
                                                    <button onClick={() => onDelete(p.id)} className="text-slate-400 hover:text-red-500 p-1" aria-label="מחק מוצר">
                                                        <Icon name={"trash-2"} className={"w-4 h-4"} />
                                                    </button>
                                                ) : <span className="text-[10px] text-slate-300">בסיס</span>}
                                            </td>
                                        </tr>
                                    ); })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminAddProduct = ({ categories, onAdd, showToast, goToInventory }) => {
            const [name, setName] = useState('');
            const [price, setPrice] = useState('');
            const [category, setCategory] = useState(categories[1] ? categories[1].id : 'computers');
            const [image, setImage] = useState('');
            const [description, setDescription] = useState('');
            const [stock, setStock] = useState('');
            const [specs, setSpecs] = useState([{ k: '', v: '' }]);
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);

            const setSpec = (i, field, val) => setSpecs(specs.map((s, idx) => idx === i ? { ...s, [field]: val } : s));
            const addSpecRow = () => setSpecs([...specs, { k: '', v: '' }]);
            const removeSpecRow = (i) => setSpecs(specs.filter((_, idx) => idx !== i));

            const submit = async () => {
                const e = {};
                if (!name.trim()) e.name = "נא להזין שם מוצר";
                if (!price || parseInt(price, 10) <= 0) e.price = "נא להזין מחיר תקין";
                if (stock === '' || parseInt(stock, 10) < 0) e.stock = "נא להזין כמות מלאי";
                if (!description.trim()) e.description = "נא להזין תיאור";
                setErrors(e);
                if (Object.keys(e).length) return;
                const specObj = {};
                specs.forEach(s => { if (s.k.trim() && s.v.trim()) specObj[s.k.trim()] = s.v.trim(); });
                setLoading(true);
                await onAdd({ name, price, category, image_url: image, description, stock_quantity: stock, specifications: specObj });
                setLoading(false);
                showToast('המוצר נוסף לקטלוג בהצלחה ✓');
                setName(''); setPrice(''); setImage(''); setDescription(''); setStock(''); setSpecs([{ k: '', v: '' }]); setErrors({});
                goToInventory();
            };

            const field = (label, node, err) => (
                <div className="space-y-1">
                    <label className="block text-xs font-bold text-slate-700">{label}</label>
                    {node}
                    {err && <p className="text-red-500 text-xs font-semibold">{err}</p>}

            const inputCls = (err) => `w-full px-4 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2 ${err ? 'border-red-500 focus:ring-red-100' : 'border-slate-300 focus:border-primary focus:ring-primary/10'}`;

                            {field("מחיר (₪) *", <input type="number" min="0" value={price} onChange={e => setPrice(e.target.value)} placeholder="349" dir="ltr" className={inputCls(errors.price) + ' text-left'} />, errors.price)}
                            {field("קטגוריה *", (
                                <select value={category} onChange={e => setCategory(e.target.value)} className={inputCls() + ' bg-white'}>
                                    {categories.filter(c => c.id !== 'all').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            ))}
                            {field("כמות במלאי *", <input type="number" min="0" value={stock} onChange={e => setStock(e.target.value)} placeholder="10" dir="ltr" className={inputCls(errors.stock) + ' text-left'} />, errors.stock)}
                        </div>
                        {field("קישור לתמונה (URL)", <input value={image} onChange={e => setImage(e.target.value)} placeholder="https://images.unsplash.com/..." dir="ltr" className={inputCls() + ' text-left'} />)}
                        {field("תיאור המוצר *", <textarea value={description} onChange={e => setDescription(e.target.value)} rows="3" placeholder="תיאור שיווקי קצר של המוצר..." className={inputCls(errors.description)} />, errors.description)}

                        <div className="space-y-2">
                            <label className="block text-xs font-bold text-slate-700">מפרט טכני (אופציונלי)</label>

        function App() {
            // State

            // Form States for checkout

            const [formEmail, setFormEmail] = useState('');
            const [formErrors, setFormErrors] = useState({});

            // ===== NEW: persistent data (inventory, users, wishlist, orders, requests) =====
            const [customProducts, setCustomProducts] = useState([]);   // admin-added products
            const [stockMap, setStockMap] = useState({});               // { productId: qty } overrides
            const [users, setUsers] = useState([]);                     // registered users
            const [currentUser, setCurrentUser] = useState(null);       // logged-in user or null (guest)
            const [orders, setOrders] = useState([]);                   // all placed orders
            const [requests, setRequests] = useState([]);               // out-of-stock product requests
            const [wishlistMap, setWishlistMap] = useState({});         // { userKey: [productId,...] }

            // ===== Supabase Connection State =====
            const [supabaseUrl, setSupabaseUrl] = useState(SUPABASE_CONFIG.url);
            const [supabaseKey, setSupabaseKey] = useState(SUPABASE_CONFIG.anonKey);
            const [isSupabaseConnected, setIsSupabaseConnected] = useState(!!supabaseClient);
            const [isSupabaseModalOpen, setIsSupabaseModalOpen] = useState(false);
            const [seedingStatus, setSeedingStatus] = useState('');     // '', 'seeding', 'success', 'error'
            const [dbProducts, setDbProducts] = useState([]);           // Products from Supabase

            // ===== NEW: UI state =====
            const [isWishlistOpen, setIsWishlistOpen] = useState(false);
            const [authOpen, setAuthOpen] = useState(false);            // login/register modal
            const [authTab, setAuthTab] = useState('login');            // 'login' | 'register' | 'forgot'
            const [accountMenuOpen, setAccountMenuOpen] = useState(false);
            const [adminTab, setAdminTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(() => LS.get('notksp_dark_mode', false));

            // ===== Accessibility states =====
            const [accOpen, setAccOpen] = useState(false);
            const [accContrast, setAccContrast] = useState(() => {
                try { return localStorage.getItem('notksp_acc_contrast') || 'normal'; } catch(e) { return 'normal'; }
            });
            const [accFontSize, setAccFontSize] = useState(() => {
                try { return parseInt(localStorage.getItem('notksp_acc_font_size'), 10) || 100; } catch(e) { return 100; }
            });
            const [accReadableFont, setAccReadableFont] = useState(() => {
                try { return localStorage.getItem('notksp_acc_readable_font') === 'true'; } catch(e) { return false; }
            });
            const [accHighlightLinks, setAccHighlightLinks] = useState(() => {
                try { return localStorage.getItem('notksp_acc_highlight_links') === 'true'; } catch(e) { return false; }
            });
            const [accStopAnimations, setAccStopAnimations] = useState(() => {
                try { return localStorage.getItem('notksp_acc_stop_animations') === 'true'; } catch(e) { return false; }
            });

            const [userOrders, setUserOrders] = useState([]);           // user purchase history
    
            const [requestProduct, setRequestProduct] = useState(null); // null = closed; string = open (prefilled name)
            const [toast, setToast] = useState(null);                   // { text, tone }
            const [reqName, setReqName] = useState('');
            const [reqNote, setReqNote] = useState('');
            const [reqEmail, setReqEmail] = useState('');
            const [reqError, setReqError] = useState('');

            // The key under which the current person's wishlist is stored
            const wishlistKey = currentUser ? ('u:' + currentUser.email) : 'guest';
            const wishlist = wishlistMap[wishlistKey] || [];

            const showToast = (text, tone = 'cta') => {
                setToast({ text, tone });
                setTimeout(() => setToast(null), 2600);
            };

            
            // Sync accessibility settings to document class list and document font size
            useEffect(() => {
                const html = document.documentElement;
                
                // 1. Contrast
                html.classList.remove('acc-contrast-high', 'acc-contrast-grayscale');
                if (accContrast === 'high') html.classList.add('acc-contrast-high');
                else if (accContrast === 'grayscale') html.classList.add('acc-contrast-grayscale');
                
                // 2. Font Size
                html.style.fontSize = accFontSize === 100 ? '' : `${accFontSize}%`;
                
                // 3. Readable Font
                if (accReadableFont) html.classList.add('acc-readable-font');
                else html.classList.remove('acc-readable-font');
                
                // 4. Highlight Links
                if (accHighlightLinks) html.classList.add('acc-highlight-links');
                else html.classList.remove('acc-highlight-links');
                
                // 5. Stop Animations
                if (accStopAnimations) html.classList.add('acc-stop-animations');
                else html.classList.remove('acc-stop-animations');
                
                // Save to localStorage
                try {
                    localStorage.setItem('notksp_acc_contrast', accContrast);
                    localStorage.setItem('notksp_acc_font_size', accFontSize.toString());
                    localStorage.setItem('notksp_acc_readable_font', accReadableFont.toString());
                    localStorage.setItem('notksp_acc_highlight_links', accHighlightLinks.toString());
                    localStorage.setItem('notksp_acc_stop_animations', accStopAnimations.toString());
                } catch(e) {}
            }, [accContrast, accFontSize, accReadableFont, accHighlightLinks, accStopAnimations]);

            const resetAccessibility = () => {
                setAccContrast('normal');
                setAccFontSize(100);
                setAccReadableFont(false);
                setAccHighlightLinks(false);
                setAccStopAnimations(false);
                showToast('הגדרות הנגישות אופסו');
            };

            // Fetch user orders (purchase history)
            useEffect(() => {
                const fetchUserOrders = async () => {
                    if (!currentUser) {
                        setUserOrders([]);
                        return;
                    }
                    if (isSupabaseConnected && supabaseClient) {
                        try {
                            const { data, error } = await supabaseClient
                                .from('orders')
                                .select('*')
                                .eq('customer_email', currentUser.email)
                                .order('created_at', { ascending: false });
                            if (!error && data) {
                                setUserOrders(data);
                            }
                        } catch (e) {
                            console.error("Error fetching user orders from Supabase:", e);
                        }
                    } else {
                        // Offline mode: filter local orders state
                        const local = (Array.isArray(orders) ? orders : []).filter(o => o.customerEmail === currentUser.email);
                        setUserOrders(local);
                    }
                };
                fetchUserOrders();
            }, [currentUser, orders, isSupabaseConnected]);
    
            // Load cart and recently viewed from localStorage on initial load
            useEffect(() => {
                const storedCart = localStorage.getItem('notksp_cart');
                if (storedCart) {
                    try {
                        setCart(JSON.parse(storedCart));
                    } catch (e) {
                        console.error('Error loading cart', e);
                    }
                }

                const storedRecently = localStorage.getItem('notksp_recently_viewed');
                if (storedRecently) {
                    try {
                        setRecentlyViewed(JSON.parse(storedRecently));
                    } catch (e) {
                        console.error('Error loading recently viewed', e);
                    }
                }
            }, []);

            // Fetch data from Supabase
            const fetchSupabaseData = async () => {
                if (!supabaseClient) return;
                try {
                    // Fetch products
                    const { data: prodData, error: prodErr } = await supabaseClient
                        .from('products')
                        .select('*')
                        .order('created_at', { ascending: true });
                    if (prodErr) throw prodErr;
                    if (prodData) setDbProducts(prodData);

                    // Fetch orders
                    const { data: ordData, error: ordErr } = await supabaseClient
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!ordErr && ordData) setOrders(ordData);

                    // Fetch requests
                    const { data: reqData, error: reqErr } = await supabaseClient
                        .from('requests')
                        .select('*')
                        .order('created_at', { ascending: false });

            useEffect(() => {
                if (isSupabaseConnected) {
                    fetchSupabaseData();
                }
            }, [isSupabaseConnected]);

            // Sync user session and auth state
            const handleSupabaseUserSession = async (authUser) => {
                if (!supabaseClient) return;
                try {
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('id', authUser.id)
                        .single();
                    
                    if (profile) {
                        setCurrentUser({
                            id: authUser.id,
                            name: profile.name || authUser.user_metadata?.name || 'משתמש',
                            email: authUser.email,
                            role: profile.role || 'customer'
                        });
                        fetchWishlistFromSupabase(authUser.id);
                    } else {
                        const newProfile = {
                            id: authUser.id,
                            email: authUser.email,
                            name: authUser.user_metadata?.name || 'משתמש חדש',
                            role: authUser.email === 'admin@notksp.co.il' ? 'admin' : 'customer'
                        };
                        await supabaseClient.from('profiles').insert(newProfile);
                        setCurrentUser({
                            id: authUser.id,
                            name: newProfile.name,
                            email: newProfile.email,
                            role: newProfile.role
                        });
                        fetchWishlistFromSupabase(authUser.id);
                    }
                } catch (e) {
                    console.error("Error fetching/creating profile:", e);
                    setCurrentUser({
                        id: authUser.id,
                        name: authUser.user_metadata?.name || 'משתמש',
                        email: authUser.email,
                        role: authUser.email === 'admin@notksp.co.il' ? 'admin' : 'customer'
                    });
                }
            };

            const fetchWishlistFromSupabase = async (userId) => {
                if (!supabaseClient) return;
                try {
                    const { data, error } = await supabaseClient
                        .from('wishlists')
                        .select('product_ids')
                        .eq('user_id', userId)
                        .single();
                    if (!error && data) {
                        const list = Array.isArray(data.product_ids) ? data.product_ids : [];
                        setWishlistMap(prev => ({ ...prev, [wishlistKey]: list }));
                    }
                } catch (e) {
                    console.error("Failed to fetch wishlist from Supabase:", e);
                }
            };

            useEffect(() => {
                if (!supabaseClient) return;

                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    if (session) {
                        handleSupabaseUserSession(session.user);
                    }
                });

                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    if (session) {
                        handleSupabaseUserSession(session.user);
                    } else {
                        setCurrentUser(null);
                    }
                });

                return () => subscription.unsubscribe();
            }, [isSupabaseConnected]);

            // ===== NEW: load persistent data + seed default admin account =====
            useEffect(() => {
                setCustomProducts(LS.get('notksp_custom_products', []));
                setStockMap(LS.get('notksp_stock', {}));
                setOrders(LS.get('notksp_orders', []));
                setRequests(LS.get('notksp_requests', []));
                setWishlistMap(LS.get('notksp_wishlist', {}));

                const ADMIN_SEED = {
                    id: 'admin',
                    name: 'מנהל החנות',
                    email: 'admin@notksp.co.il',
                    passwordHash: pseudoHash('Admin#2026'),
                    role: 'admin',
                    createdAt: Date.now()
                };

                let loadedUsers = LS.get('notksp_users', null);
                if (!loadedUsers) {
                    loadedUsers = [ADMIN_SEED];
                    LS.set('notksp_users', loadedUsers);
                } else if (!loadedUsers.find(u => u.email === 'admin@notksp.co.il')) {
                    // Admin missing from saved list — add it
                    loadedUsers = [ADMIN_SEED, ...loadedUsers];
                    LS.set('notksp_users', loadedUsers);
                } else {
                    // Ensure admin's passwordHash is always up to date
                    loadedUsers = loadedUsers.map(u =>
                        u.email === 'admin@notksp.co.il'
                            ? { ...u, passwordHash: pseudoHash('Admin#2026'), role: 'admin' }
                            : u
                    );
                }
                setUsers(loadedUsers);

                if (!isSupabaseConnected) {
                    const sessionEmail = LS.get('notksp_session', null);
                    if (sessionEmail) {
                        const u = loadedUsers.find(x => x.email === sessionEmail);
                        if (u) setCurrentUser(u);
                    }
                }
            }, [isSupabaseConnected]);

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                LS.set('notksp_dark_mode', isDarkMode);
            }, [isDarkMode]);

            

            // Prefill checkout fields for logged-in users
            useEffect(() => {
                if (view === 'checkout' && currentUser) {
                    setFormName(prev => prev || currentUser.name);
                    setFormEmail(prev => prev || currentUser.email);
                }
            }, [view, currentUser]);

            // Sync the product-request form when it opens
            useEffect(() => {
                if (requestProduct !== null) {
                    setReqName(requestProduct);
                    setReqNote('');
                    setReqEmail(currentUser ? currentUser.email : '');
                    setReqError('');
                }
            }, [requestProduct]);

            // Save cart to localStorage when it changes
            const saveCart = (newCart) => {
                setCart(newCart);
                localStorage.setItem('notksp_cart', JSON.stringify(newCart));
            };

            // Trigger Lucide icons update on view updates
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, activeProduct, isCartOpen, selectedCategory, searchQuery, userOrders, accOpen]);

            // Add product to recently viewed (max 4, no duplicates, move to front)
            const addToRecentlyViewed = (productId) => {
                let updated = [productId, ...recentlyViewed.filter(id => id !== productId)];
                updated = updated.slice(0, 4); // Limit to 4
                setRecentlyViewed(updated);
                localStorage.setItem('notksp_recently_viewed', JSON.stringify(updated));
            };

            // Helper to handle opening product modal and recording view
            const openProductDetails = (product) => {
                setActiveProduct(product);
                addToRecentlyViewed(product.id);
            };

            // Cart Functions
            const addToCart = (product) => {
                const available = stockOf(product.id);
                if (available <= 0) {
                    setRequestProduct(product.name);
                    return;
                }
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    if (existing.quantity >= available) {
                        showToast(`נותרו רק ${available} יחידות במלאי`, 'amber');
                        return;
                    }
                    const updated = cart.map(item =>
                        item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                    );
                    saveCart(updated);
                } else {
                    const updated = [...cart, { ...product, quantity: 1 }];
                    saveCart(updated);
                }
                setIsCartOpen(true);
            };

            const updateCartQuantity = (productId, change) => {
                const available = stockOf(productId);
                const updated = cart.map(item => {
                    if (item.id === productId) {
                        let newQty = item.quantity + change;
                        if (change > 0 && newQty > available) {
                            showToast(`נותרו רק ${available} יחידות במלאי`, 'amber');
                            newQty = available;
                        }
                        return newQty > 0 ? { ...item, quantity: newQty } : null;
                    }
                    return item;
                }).filter(Boolean);
                saveCart(updated);
            };

            const removeFromCart = (productId) => {
                const updated = cart.filter(item => item.id !== productId);
                saveCart(updated);
            };

            const clearCart = () => {
                saveCart([]);
            };

            // Calculations
            const cartTotal = useMemo(() => {
                return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
            }, [cart]);

            const cartCount = useMemo(() => {
                return cart.reduce((count, item) => count + item.quantity, 0);
            }, [cart]);

            // ===== NEW: merged catalog (base + admin products) with effective stock =====
            const catalog = useMemo(() => {
                if (isSupabaseConnected && Array.isArray(dbProducts) && dbProducts.length > 0) {
                    return dbProducts;
                }
                const base = PRODUCTS.map(p => ({
                    ...p,
                    stock_quantity: stockMap[p.id] !== undefined ? stockMap[p.id] : (STOCK_DEFAULTS[p.id] ?? 0)
                }));
                const custom = customProducts.map(p => ({
                    ...p,
                    stock_quantity: stockMap[p.id] !== undefined ? stockMap[p.id] : (p.stock_quantity ?? 0)
                }));
                return [...base, ...custom];
            }, [customProducts, stockMap, dbProducts, isSupabaseConnected]);

            const getProduct = (id) => catalog.find(p => p.id === id);
            const stockOf = (id) => { const p = getProduct(id); return p ? p.stock_quantity : 0; };

            // ---- Persistence savers ----
            const persistStock = (map) => { setStockMap(map); LS.set('notksp_stock', map); };
            const persistCustom = (list) => { setCustomProducts(list); LS.set('notksp_custom_products', list); };
            const persistUsers = (list) => { setUsers(list); LS.set('notksp_users', list); };
            const persistOrders = (list) => { setOrders(list); LS.set('notksp_orders', list); };
            const persistRequests = (list) => { setRequests(list); LS.set('notksp_requests', list); };
            const persistWishlist = (map) => { setWishlistMap(map); LS.set('notksp_wishlist', map); };

            // ---- Inventory management (admin) ----
            const setStock = async (id, qty) => {
                const q = Math.max(0, parseInt(qty, 10) || 0);
                
                // Optimistic UI Update
                persistStock({ ...stockMap, [id]: q });
                
                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { error } = await supabaseClient
                            .from('products')
                            .update({ stock_quantity: q })
                            .eq('id', id);
                        if (error) throw error;
                        fetchSupabaseData(); // reload in background
                        showToast('המלאי עודכן בהצלחה');
                    } catch (e) {
                        showToast('שגיאה בעדכון המלאי: ' + e.message, 'amber');
                    }
                }
            };
            const adjustStock = async (id, delta) => await setStock(id, stockOf(id) + delta);

            const addProduct = async (data) => {
                const id = 'c' + Date.now().toString().slice(-7);
                const product = {
                    id,
                    name: data.name.trim(),
                    price: Math.max(0, parseInt(data.price, 10) || 0),
                    category: data.category,
                    image_url: data.image_url.trim() || 'https://images.unsplash.com/photo-1518770660439-4636190af475',
                    description: data.description.trim(),
                    stock_quantity: Math.max(0, parseInt(data.stock_quantity, 10) || 0),
                    specifications: data.specifications || {}
                };

                // Optimistic UI Update
                persistCustom([...customProducts, product]);
                persistStock({ ...stockMap, [id]: product.stock_quantity });

                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('products').insert(product);
                        if (error) throw error;
                        fetchSupabaseData(); // reload
                        showToast('המוצר נוסף בהצלחה!');
                    } catch (e) {
                        showToast('שגיאה בהוספת המוצר ל-Supabase: ' + e.message, 'amber');
                    }
                }
                return product;
            };

            const deleteCustomProduct = async (id) => {
                // Optimistic UI Update
                persistCustom(customProducts.filter(p => p.id !== id));
                const m = { ...stockMap }; delete m[id]; persistStock(m);

                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('products').delete().eq('id', id);
                        if (error) throw error;
                        fetchSupabaseData(); // reload
                        showToast('המוצר נמחק בהצלחה');
                    } catch (e) {
                        showToast('שגיאה במחיקת המוצר: ' + e.message, 'amber');
                    }
                }
            };

            // ---- Auth ----
            const registerUser = async ({ name, email, password }) => {
                email = email.trim().toLowerCase();
                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { data, error } = await supabaseClient.auth.signUp({
                            email,
                            password,
                            options: {
                                data: { name: name.trim() }
                            }
                        });
                        if (error) throw error;
                        showToast('נרשמת בהצלחה!');
                        return { ok: true };
                    } catch (e) {
                        return { ok: false, error: e.message || "ההרשמה נכשלה" };
                    }
                }
                // Offline fallback
                if (users.some(u => u.email === email)) {
                    return { ok: false, error: "כתובת האימייל כבר רשומה במערכת" };
                }
                const user = { id: 'u' + Date.now(), name: name.trim(), email, passwordHash: pseudoHash(password), role: 'customer', createdAt: Date.now() };
                const updated = [...users, user];
                persistUsers(updated);
                setCurrentUser(user);
                LS.set('notksp_session', user.email);
                return { ok: true, user };
            };

            const loginUser = async ({ email, password }) => {
                email = email.trim().toLowerCase();
                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { data, error } = await supabaseClient.auth.signInWithPassword({
                            email,
                            password
                        });
                        if (error) throw error;
                        showToast('התחברת בהצלחה!');
                        return { ok: true };
                    } catch (e) {
                        // Translate common Supabase errors to Hebrew
                        let msg = e.message || '';
                        if (msg.includes('Invalid login credentials') || msg.includes('invalid_credentials'))
                            msg = 'אימייל או סיסמה שגויים';
                        else if (msg.includes('Email not confirmed'))
                            msg = 'האימייל לא אושר — אשר אותו ב-Supabase Dashboard או בטל את חובת האישור';
                        else if (msg.includes('Too many requests'))
                            msg = 'יותר מדי ניסיונות — נסה שוב בעוד מספר דקות';
                        else if (msg.includes('Email logins are disabled'))
                            msg = 'התחברות באמצעות אימייל כבויה ב-Supabase! אנא הדלק את האפשרות "Enable Email provider" בהגדרות.';

                        // Offline fallback (covers hardcoded admin)
                        const user = users.find(u => u.email === email);
                        if (user && user.passwordHash === pseudoHash(password)) {
                            setCurrentUser(user);
                            LS.set('notksp_session', user.email);
                            showToast('התחברת בהצלחה!');
                            return { ok: true, user };
                        }
                        return { ok: false, error: msg };
                    }
                }
                // Offline fallback
                const user = users.find(u => u.email === email);
                if (!user || user.passwordHash !== pseudoHash(password)) {
                    return { ok: false, error: "אימייל או סיסמה שגויים" };
                }
                setCurrentUser(user);
                LS.set('notksp_session', user.email);
                return { ok: true, user };
            };

            const logoutUser = async () => {
                if (isSupabaseConnected && supabaseClient) {
                    try {
                        await supabaseClient.auth.signOut();
                    } catch (e) {
                        console.error("Failed to sign out from Supabase:", e);
                    }
                }
                setCurrentUser(null);
                setAccountMenuOpen(false);
                LS.set('notksp_session', null);
                if (view === 'admin') setView('home');
                showToast('התנתקת מהחשבון', 'slate');
            };

            // Password reset via Brevo. Returns a dev token if no backend is wired yet.
            const requestPasswordReset = async (email) => {
                email = email.trim().toLowerCase();
                if (!EMAIL_RE.test(email)) return { ok: false, error: "כתובת אימייל אינה תקינה" };
                const token = Math.random().toString(36).slice(2, 8).toUpperCase();
                const tokens = LS.get('notksp_reset_tokens', {});
                tokens[email] = { token, expires: Date.now() + 1000 * 60 * 30 };
                LS.set('notksp_reset_tokens', tokens);

                const resetLink = `${location.origin}${location.pathname}?reset=${token}&email=${encodeURIComponent(email)}`;

                if (BREVO_CONFIG.endpoint) {
                    try {
                        const res = await fetch(BREVO_CONFIG.endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, token, resetLink })
                        });
                        if (!res.ok) throw new Error('bad status');
                        return { ok: true, sent: true };
                    } catch (e) {
                        return { ok: false, error: "שליחת המייל נכשלה. בדוק את הגדרות ה-Backend של Brevo." };
                    }
                }
                // No backend configured yet -> simulate and surface the token for the demo
                return { ok: true, sent: false, token, resetLink };
            };

            const isWishlisted = (id) => wishlist.includes(id);
            const toggleWishlist = async (id) => {
                const current = wishlistMap[wishlistKey] || [];
                const next = current.includes(id) ? current.filter(x => x !== id) : [...current, id];
                
                if (isSupabaseConnected && supabaseClient && currentUser && currentUser.role !== 'admin') {
                    try {
                        await supabaseClient
                            .from('wishlists')
                            .upsert({
                                user_id: currentUser.id,
                                product_ids: next,
                                updated_at: new Date().toISOString()
                            });
                    } catch (e) {
                        console.error("Failed to save wishlist in Supabase:", e);
                    }
                }

                persistWishlist({ ...wishlistMap, [wishlistKey]: next });
                showToast(current.includes(id) ? 'הוסר מרשימת המשאלות' : 'נוסף לרשימת המשאלות ❤');
            };
            const wishlistProducts = useMemo(
                () => wishlist.map(id => getProduct(id)).filter(Boolean),
                [wishlist, catalog]
            );

            // ---- Out-of-stock / unavailable product requests ----
            const submitRequest = async ({ productName, note, email }) => {
                const req = {
                    id: 'REQ-' + Date.now().toString().slice(-6),
                    productName: productName.trim(),
                    note: (note || '').trim(),
                    email: (email || (currentUser && currentUser.email) || '').trim(),
                    date: new Date().toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' }),
                    ts: Date.now(),
                    status: 'open'
                };

                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('requests').insert({
                            id: req.id,
                            product_name: req.productName,
                            note: req.note,
                            email: req.email,
                            status: req.status
                        });
                        if (error) throw error;
                        fetchSupabaseData();
                        showToast('הבקשה נשלחה ונשמרה ב-Supabase!');
                        return;
                    } catch (e) {
                        showToast('שגיאה בשמירת הבקשה ב-Supabase: ' + e.message, 'amber');
                    }
                }

                persistRequests([req, ...requests]);
                showToast('הבקשה נשלחה! נעדכן אותך כשהמוצר יהיה זמין.');
            };
            const setRequestStatus = async (id, status) => {
                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('requests').update({ status }).eq('id', id);
                        if (error) throw error;
                        fetchSupabaseData();
                        showToast('סטטוס הבקשה עודכן ב-Supabase');
                        return;
                    } catch (e) {
                        showToast('שגיאה בעדכון סטטוס הבקשה: ' + e.message, 'amber');
                    }
                }
                persistRequests(requests.map(r => r.id === id ? { ...r, status } : r));
            };

            // Filtered Products
            const filteredProducts = useMemo(() => {
                return catalog.filter(product => {
                    const matchesCategory = selectedCategory === 'all' || product.category === selectedCategory;
                    
                    const query = searchQuery.trim().toLowerCase();
                    const matchesSearch = !query || 
                        (product.name && product.name.toLowerCase().includes(query)) || 
                        (product.description && product.description.toLowerCase().includes(query));
                        
                    return matchesCategory && matchesSearch;
                });
            }, [selectedCategory, searchQuery, catalog]);

            // Similar products selector (excluding current, same category if possible, or randoms)
            const similarProducts = useMemo(() => {
                if (!activeProduct) return [];
                // Find products in same category (excluding active one)
                let list = catalog.filter(p => p.id !== activeProduct.id && p.category === activeProduct.category);
                if (list.length === 0) {
                    // Fallback to any other products
                    list = catalog.filter(p => p.id !== activeProduct.id);
                }
                // Return up to 3 random ones from the list
                return list.slice(0, 3);
            }, [activeProduct, catalog]);

            // Map product IDs in recentlyViewed back to actual products
            const recentlyViewedProducts = useMemo(() => {
                return recentlyViewed
                    .map(id => catalog.find(p => p.id === id))
                    .filter(Boolean);
            }, [recentlyViewed, catalog]);

            // Handle Checkout Submit
            const handlePlaceOrder = async (e) => {
                e.preventDefault();
                
                // Validation
                const errors = {};
                if (!formName.trim()) errors.name = "נא להזין שם מלא";
                if (!formPhone.trim()) {
                    errors.phone = "נא להזין מספר טלפון";
                } else if (!/^\d{9,10}$/.test(formPhone.replace(/[-]/g, ''))) {
                    errors.phone = "מספר טלפון אינו תקין (9-10 ספרות)";
                }
                if (!formAddress.trim()) errors.address = "נא להזין כתובת משלוח";

                if (Object.keys(errors).length > 0) {
                    setFormErrors(errors);
                    return;
                }

                // Place Order
                const orderId = 'ORD-' + Date.now().toString().slice(-6) + '-' + Math.floor(Math.random() * 900 + 100);
                const orderData = {
                    id: orderId,
                    customerName: formName,
                    customerPhone: formPhone,
                    customerEmail: formEmail || (currentUser && currentUser.email) || '',
                    customerAddress: formAddress,
                    isGuest: !currentUser,
                    items: [...cart],
                    total: cartTotal,
                    ts: Date.now(),
                    date: new Date().toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' })
                };

                if (isSupabaseConnected && supabaseClient) {
                    try {
                        const { error: ordErr } = await supabaseClient.from('orders').insert({
                            id: orderData.id,
                            customer_name: orderData.customerName,
                            customer_phone: orderData.customerPhone,
                            customer_email: orderData.customerEmail,
                            customer_address: orderData.customerAddress,
                            is_guest: orderData.isGuest,
                            items: orderData.items,
                            total: orderData.total
                        });
                        if (ordErr) throw ordErr;

                        // Decrement stock in Supabase for each item
                        for (const item of cart) {
                            const currentQty = stockOf(item.id);
                            const newQty = Math.max(0, currentQty - item.quantity);
                            await supabaseClient
                                .from('products')
                                .update({ stock_quantity: newQty })
                                .eq('id', item.id);
                        }

                        fetchSupabaseData();
                        setCompletedOrder(orderData);
                        clearCart();
                        showToast('ההזמנה נקלטה ב-Supabase!');
                    } catch (err) {
                        showToast('שגיאה בביצוע ההזמנה ב-Supabase: ' + err.message, 'amber');
                        return;
                    }
                } else {
                    // Offline fallback
                    persistOrders([orderData, ...orders]);
                    const newStock = { ...stockMap };
                    cart.forEach(item => {
                        const current = newStock[item.id] !== undefined ? newStock[item.id] : (STOCK_DEFAULTS[item.id] ?? (getProduct(item.id)?.stock_quantity ?? 0));
                        newStock[item.id] = Math.max(0, current - item.quantity);
                    });
                    persistStock(newStock);
                    setCompletedOrder(orderData);
                    clearCart();
                }

                setFormName('');
                setFormPhone('');
                setFormAddress('');
                setFormEmail('');
                setFormErrors({});
                setView('thank-you');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Category Icon Helper Component
            const CategoryIcon = ({ iconName, className = "w-5 h-5" }) => {

                                                >
                                                    רגיל
                                                </button>
                                                <button 
                                                    onClick={() => setAccContrast('high')}
                                                    className={`px-3 py-2 rounded-lg text-xs font-bold transition-all border cursor-pointer ${accContrast === 'high' ? 'bg-primary text-white border-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700'}`}
                                                >
                                                    ניגודיות גבוהה
                                                </button>
                                                <button 
                                                    onClick={() => setAccContrast('grayscale')}
                                                    className={`px-3 py-2 rounded-lg text-xs font-bold transition-all border cursor-pointer ${accContrast === 'grayscale' ? 'bg-primary text-white border-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700'}`}
                                                >
                                                    מונוכרום
                                                </button>
                                            </div>
                                        </div>

                                        {/* Font size */}
                                        <div className="space-y-1.5">
                                            <label className="block text-xs font-bold text-slate-700 dark:text-slate-300">גודל גופן</label>
                                            <div className="grid grid-cols-4 gap-2">
                                                {[100, 110, 120, 130].map(sz => (
                                                    <button 
                                                        key={sz}
                                                        onClick={() => setAccFontSize(sz)}
                                                        className={`px-2 py-2 rounded-lg text-xs font-bold transition-all border cursor-pointer ${accFontSize === sz ? 'bg-primary text-white border-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700'}`}
                                                    >
                                                        {sz}%
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Other enhancements */}
                                        <div className="space-y-2 pt-2 border-t border-slate-100 dark:border-slate-800">
                                            <button 
                                                onClick={() => setAccReadableFont(!accReadableFont)}
                                                className={`w-full px-3 py-2 rounded-lg text-xs font-bold border transition-all flex items-center justify-between cursor-pointer ${accReadableFont ? 'bg-primary/10 border-primary text-primary' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'}`}
                                            >
                                                <span className={`w-3.5 h-3.5 rounded-full border-2 flex items-center justify-center ${accReadableFont ? 'border-primary bg-primary' : 'border-slate-400'}`}>
                                                    {accReadableFont && <span className="w-1.5 h-1.5 bg-white rounded-full"></span>}
                                                </span>
                                                <span>גופן קריא (Sans-Serif)</span>
                                            </button>

                                            <button 
                                                onClick={() => setAccHighlightLinks(!accHighlightLinks)}
                                                className={`w-full px-3 py-2 rounded-lg text-xs font-bold border transition-all flex items-center justify-between cursor-pointer ${accHighlightLinks ? 'bg-primary/10 border-primary text-primary' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'}`}
                                            >
                                                <span className={`w-3.5 h-3.5 rounded-full border-2 flex items-center justify-center ${accHighlightLinks ? 'border-primary bg-primary' : 'border-slate-400'}`}>
                                                    {accHighlightLinks && <span className="w-1.5 h-1.5 bg-white rounded-full"></span>}
                                                </span>
                                                <span>הדגשת קישורים וכפתורים</span>
                                            </button>

                                            <button 
                                                onClick={() => setAccStopAnimations(!accStopAnimations)}
                                                className={`w-full px-3 py-2 rounded-lg text-xs font-bold border transition-all flex items-center justify-between cursor-pointer ${accStopAnimations ? 'bg-primary/10 border-primary text-primary' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'}`}
                                            >
                                                <span className={`w-3.5 h-3.5 rounded-full border-2 flex items-center justify-center ${accStopAnimations ? 'border-primary bg-primary' : 'border-slate-400'}`}>
                                                    {accStopAnimations && <span className="w-1.5 h-1.5 bg-white rounded-full"></span>}
                                                </span>
                                                <span>ביטול אנימציות ותנועה</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
    
                    {/* 9. Toast */}
                    {toast && (
                        <div className="fixed bottom-4 sm:bottom-6 left-1/2 -translate-x-1/2 z-[70] fade-in">
                            <div className={`px-5 py-3 rounded-full shadow-premium-hover text-xs font-bold flex items-center gap-2 ${toast.tone === 'amber' ? 'bg-amber-500 text-white' : toast.tone === 'slate' ? 'bg-slate-800 text-white' : 'bg-cta text-primary'}`}>
                                <Icon name={toast.tone === 'amber' ? 'alert-triangle' : 'check-circle'} className={"w-4 h-4"} />
                                {toast.text}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render root React component
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
